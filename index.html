<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="語音記帳">
<link rel="manifest" href="manifest.json">
<title>語音記帳</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Noto Sans TC', -apple-system, 'Helvetica Neue', sans-serif;
    background: #fafafa; max-width: 480px; margin: 0 auto; min-height: 100vh;
    min-height: -webkit-fill-available;
  }
  
  /* Header */
  .header { padding: 20px 16px 16px; background: #fff; border-bottom: 1px solid #f0f0f0; }
  .header-top { display: flex; justify-content: space-between; align-items: center; }
  .header h1 { font-size: 24px; font-weight: 800; color: #1a1a2e; letter-spacing: -0.5px; }
  .header .sub { font-size: 12px; color: #999; margin-top: 2px; }
  .settings-btn {
    width: 36px; height: 36px; border-radius: 10px; border: 1px solid #eee;
    background: #fff; font-size: 18px; cursor: pointer; display: flex;
    align-items: center; justify-content: center;
  }
  .summary {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 16px; padding: 12px 16px; border-radius: 12px;
    background: linear-gradient(135deg, #f8f8ff, #f0f0ff);
  }
  .summary .label { color: #666; font-size: 13px; }
  .summary .amount { font-size: 24px; font-weight: 800; color: #1a1a2e; font-family: 'SF Mono', monospace; }

  /* Mic */
  .mic-area { display: flex; flex-direction: column; align-items: center; padding: 20px 0; }
  .mic-btn {
    width: 80px; height: 80px; border-radius: 50%; border: none;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 28px; transition: all 0.3s ease;
    box-shadow: 0 8px 32px rgba(99,102,241,0.3);
  }
  .mic-btn.recording {
    background: #ef4444; transform: scale(1.1);
    box-shadow: 0 0 0 8px rgba(239,68,68,0.15), 0 8px 32px rgba(239,68,68,0.3);
    animation: pulse 1.5s infinite;
  }
  .mic-btn.processing { opacity: 0.7; pointer-events: none; }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 8px rgba(239,68,68,0.15), 0 8px 32px rgba(239,68,68,0.3); }
    50% { box-shadow: 0 0 0 16px rgba(239,68,68,0.08), 0 8px 32px rgba(239,68,68,0.3); }
  }
  .mic-hint { margin-top: 10px; font-size: 13px; color: #999; }

  /* Transcript */
  .transcript {
    margin: 0 16px; padding: 10px 14px; border-radius: 10px;
    background: #fff; border: 1.5px dashed #d0d0ff;
    font-size: 15px; color: #333; line-height: 1.5; display: none;
  }
  .transcript.show { display: block; }

  /* Manual input */
  .manual { display: flex; gap: 8px; padding: 12px 16px; }
  .manual input {
    flex: 1; padding: 10px 12px; border-radius: 10px; border: 1.5px solid #e0e0e0;
    font-size: 15px; outline: none;
  }
  .manual input:focus { border-color: #6366f1; }
  .manual button {
    padding: 10px 16px; border-radius: 10px; border: none;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: #fff; font-size: 14px; font-weight: 600; cursor: pointer;
  }
  .manual button:disabled { opacity: 0.5; }

  /* Status */
  .status {
    padding: 8px 16px; margin: 0 16px; border-radius: 8px;
    font-size: 13px; text-align: center; display: none;
  }
  .status.show { display: block; }
  .status.ok { background: #ecfdf5; color: #10b981; }
  .status.err { background: #fef2f2; color: #ef4444; }
  .status.info { background: #f0f0ff; color: #6366f1; }

  /* Expense list */
  .expenses { padding: 12px 16px; flex: 1; overflow-y: auto; }
  .empty { text-align: center; color: #ccc; margin-top: 40px; }
  .empty .icon { font-size: 48px; margin-bottom: 12px; }
  .empty .hint { font-size: 12px; margin-top: 8px; }

  .expense-card {
    background: #fff; border-radius: 12px; padding: 14px;
    margin-bottom: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    border-left: 4px solid #6366f1;
  }
  .expense-card.confirmed { opacity: 0.7; }
  .expense-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .expense-info { flex: 1; }
  .expense-name { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .expense-name .icon { font-size: 20px; }
  .expense-name .desc { font-weight: 600; font-size: 16px; color: #1a1a2e; }
  .expense-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
  .tag { padding: 2px 8px; border-radius: 6px; font-size: 12px; font-weight: 600; }
  .tag-light { padding: 2px 8px; border-radius: 6px; font-size: 12px; background: #f5f5f5; color: #888; }
  .expense-amount { text-align: right; }
  .expense-amount .num { font-size: 22px; font-weight: 700; color: #1a1a2e; font-family: 'SF Mono', monospace; }
  .expense-amount .cur { font-size: 11px; color: #999; }
  .expense-actions { display: flex; gap: 8px; margin-top: 12px; justify-content: flex-end; }
  .expense-actions button {
    padding: 6px 12px; border-radius: 8px; border: none;
    background: transparent; font-size: 13px; font-weight: 600; cursor: pointer;
  }
  .btn-del { color: #ef4444; }
  .btn-edit { color: #6366f1; }
  .btn-confirm { background: #10b981; color: #fff; }
  .confirmed-label { text-align: right; margin-top: 8px; font-size: 12px; color: #10b981; }

  /* Overlay / Modal */
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    display: none; align-items: center; justify-content: center;
    z-index: 100; padding: 16px;
  }
  .overlay.show { display: flex; }
  .modal {
    background: #fff; border-radius: 16px; padding: 24px;
    width: 100%; max-width: 400px; max-height: 90vh; overflow-y: auto;
  }
  .modal h2 { font-size: 22px; font-weight: 700; margin-bottom: 4px; color: #1a1a2e; }
  .modal .sub { color: #666; font-size: 13px; margin-bottom: 20px; }
  .modal label { display: block; font-size: 13px; font-weight: 600; color: #333; margin-bottom: 4px; margin-top: 12px; }
  .modal input, .modal select {
    width: 100%; padding: 10px 12px; border-radius: 10px; border: 1.5px solid #e0e0e0;
    font-size: 15px; outline: none;
  }
  .modal input:focus, .modal select:focus { border-color: #6366f1; }
  .modal .hint { font-size: 11px; color: #999; margin-top: 2px; }
  .modal-actions { display: flex; gap: 8px; margin-top: 16px; }
  .modal-actions button { flex: 1; padding: 10px 20px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; }
  .btn-cancel { border: 1.5px solid #e0e0e0; background: #fff; }
  .btn-save { border: none; background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff; }
  .btn-save:disabled { opacity: 0.5; }
</style>
</head>
<body>

<!-- Setup Modal -->
<div class="overlay" id="setupModal">
  <div class="modal">
    <h2>⚙️ 初始設定</h2>
    <p class="sub">只需設定一次，之後就能直接用語音記帳</p>

    <label>Claude API Key</label>
    <input type="password" id="cfgKey" placeholder="sk-ant-...">
    <p class="hint">從 console.anthropic.com 取得</p>

    <label>Google Apps Script URL</label>
    <input type="url" id="cfgUrl" placeholder="https://script.google.com/macros/s/...">
    <p class="hint">部署 Apps Script 後取得的網址</p>

    <label>驗證密碼（Token）</label>
    <input type="password" id="cfgToken" placeholder="與 Apps Script 裡設定的一致">
    <p class="hint">防止未授權寫入</p>

    <div class="modal-actions">
      <button class="btn-save" style="flex:1" onclick="saveConfig()">儲存設定</button>
    </div>
  </div>
</div>

<!-- Edit Modal -->
<div class="overlay" id="editModal">
  <div class="modal">
    <h2>編輯支出</h2>
    <label>日期</label>
    <input type="date" id="editDate">
    <label>項目說明</label>
    <input type="text" id="editDesc">
    <label>金額</label>
    <input type="number" id="editAmount">
    <label>付款方式</label>
    <select id="editPayment">
      <option>信用卡</option><option>現金</option><option>帳戶</option>
      <option>悠遊卡</option><option>Line Pay</option><option>Apple Pay</option>
    </select>
    <label>幣別</label>
    <select id="editCurrency">
      <option>TWD</option><option>JPY</option><option>USD</option><option>EUR</option>
    </select>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeEdit()">取消</button>
      <button class="btn-save" onclick="saveEdit()">儲存</button>
    </div>
  </div>
</div>

<!-- Main App -->
<div class="header">
  <div class="header-top">
    <div>
      <h1>語音記帳</h1>
      <div class="sub">說一句話，自動入帳</div>
    </div>
    <button class="settings-btn" onclick="openSetup()">⚙️</button>
  </div>
  <div class="summary">
    <span class="label">今日支出</span>
    <span class="amount" id="todayTotal">$0</span>
  </div>
</div>

<div class="mic-area">
  <button class="mic-btn" id="micBtn" onclick="toggleMic()">🎤</button>
  <div class="mic-hint" id="micHint">點擊開始說話</div>
</div>

<div class="transcript" id="transcript"></div>

<div class="manual">
  <input type="text" id="manualInput" placeholder="或用打字的，例如：午餐便當 80"
    onkeydown="if(event.key==='Enter')manualSubmit()">
  <button onclick="manualSubmit()" id="manualBtn">送出</button>
</div>

<div class="status" id="statusBar"></div>

<div class="expenses" id="expenseList">
  <div class="empty" id="emptyState">
    <div class="icon">🎙️</div>
    <div>按下麥克風開始記帳</div>
    <div class="hint">「信用卡買咖啡 65 元」</div>
  </div>
</div>

<script>
const ICONS = { "餐飲":"🍜","交通":"🚗","購物":"🛍️","娛樂":"🎮","醫療":"💊","日用品":"🧴","通訊":"📱","住宿":"🏠","教育":"📚","其他":"📌" };
const COLORS = { "信用卡":"#6366f1","現金":"#10b981","帳戶":"#f59e0b","悠遊卡":"#06b6d4","Line Pay":"#22c55e","Apple Pay":"#1f2937" };

let config = null;
let expenses = [];
let confirmedSet = new Set();
let recording = false;
let processing = false;
let recognition = null;
let editIdx = null;

// ─── Config ───
function loadConfig() {
  try {
    const s = localStorage.getItem('voice-expense-config');
    if (s) { config = JSON.parse(s); return true; }
  } catch {}
  return false;
}

function saveConfig() {
  const key = document.getElementById('cfgKey').value.trim();
  const url = document.getElementById('cfgUrl').value.trim();
  const token = document.getElementById('cfgToken').value.trim();
  if (!key || !url || !token) return;
  config = { claudeKey: key, sheetUrl: url, token: token };
  localStorage.setItem('voice-expense-config', JSON.stringify(config));
  document.getElementById('setupModal').classList.remove('show');
}

function openSetup() {
  if (config) {
    document.getElementById('cfgKey').value = config.claudeKey || '';
    document.getElementById('cfgUrl').value = config.sheetUrl || '';
    document.getElementById('cfgToken').value = config.token || '';
  }
  document.getElementById('setupModal').classList.add('show');
}

// ─── Expenses Storage ───
function loadExpenses() {
  try {
    const today = new Date().toISOString().slice(0, 10);
    const s = localStorage.getItem('voice-expenses-' + today);
    if (s) {
      const d = JSON.parse(s);
      expenses = d.expenses || [];
      confirmedSet = new Set(d.confirmed || []);
    }
  } catch {}
}

function saveExpenses() {
  const today = new Date().toISOString().slice(0, 10);
  localStorage.setItem('voice-expenses-' + today, JSON.stringify({
    expenses, confirmed: [...confirmedSet]
  }));
}

// ─── Status ───
function showStatus(msg, type) {
  const el = document.getElementById('statusBar');
  el.textContent = msg;
  el.className = 'status show ' + type;
  setTimeout(() => el.classList.remove('show'), 3000);
}

// ─── Today Total ───
function updateTotal() {
  const today = new Date().toISOString().slice(0, 10);
  const total = expenses
    .filter((e, i) => confirmedSet.has(i) && e.date === today && e.currency === 'TWD')
    .reduce((s, e) => s + Number(e.amount), 0);
  document.getElementById('todayTotal').textContent = '$' + total.toLocaleString();
}

// ─── Render ───
function render() {
  const list = document.getElementById('expenseList');
  const empty = document.getElementById('emptyState');

  if (expenses.length === 0) {
    empty.style.display = 'block';
    // remove cards
    list.querySelectorAll('.expense-card').forEach(c => c.remove());
    updateTotal();
    return;
  }

  empty.style.display = 'none';
  // rebuild
  list.querySelectorAll('.expense-card').forEach(c => c.remove());

  expenses.forEach((item, idx) => {
    const color = COLORS[item.payment] || '#6366f1';
    const icon = ICONS[item.category] || '📌';
    const isConfirmed = confirmedSet.has(idx);

    const card = document.createElement('div');
    card.className = 'expense-card' + (isConfirmed ? ' confirmed' : '');
    card.style.borderLeftColor = color;

    const tagBg = color + '18';
    const currencyDisplay = item.currency !== 'TWD' ? `<span class="tag-light">${item.currency}</span>` : '';
    const prefix = item.currency === 'TWD' ? '$' : '';
    const curLabel = item.currency !== 'TWD' ? `<div class="cur">${item.currency}</div>` : '';

    let actions = '';
    if (!isConfirmed) {
      actions = `<div class="expense-actions">
        <button class="btn-del" onclick="deleteExpense(${idx})">刪除</button>
        <button class="btn-edit" onclick="openEdit(${idx})">編輯</button>
        <button class="btn-confirm" onclick="confirmExpense(${idx})">✓ 確認入帳</button>
      </div>`;
    } else {
      actions = `<div class="confirmed-label">✓ 已入帳</div>`;
    }

    card.innerHTML = `
      <div class="expense-top">
        <div class="expense-info">
          <div class="expense-name">
            <span class="icon">${icon}</span>
            <span class="desc">${item.description}</span>
          </div>
          <div class="expense-tags">
            <span class="tag" style="background:${tagBg};color:${color}">${item.payment}</span>
            <span class="tag-light">${item.date}</span>
            ${currencyDisplay}
          </div>
        </div>
        <div class="expense-amount">
          <div class="num">${prefix}${Number(item.amount).toLocaleString()}</div>
          ${curLabel}
        </div>
      </div>
      ${actions}
    `;
    list.appendChild(card);
  });

  updateTotal();
}

// ─── Speech ───
function toggleMic() {
  if (processing) return;
  if (recording) { recognition?.stop(); return; }

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { showStatus('此瀏覽器不支援語音辨識', 'err'); return; }

  recognition = new SR();
  recognition.lang = 'zh-TW';
  recognition.continuous = false;
  recognition.interimResults = true;

  let finalText = '';

  recognition.onresult = (e) => {
    const text = Array.from(e.results).map(r => r[0].transcript).join('');
    finalText = text;
    const el = document.getElementById('transcript');
    el.textContent = text;
    el.classList.add('show');
  };

  recognition.onend = () => {
    recording = false;
    const btn = document.getElementById('micBtn');
    btn.classList.remove('recording');
    document.getElementById('micHint').textContent = '點擊開始說話';
    if (finalText) parseWithClaude(finalText);
  };

  recognition.onerror = (e) => {
    recording = false;
    document.getElementById('micBtn').classList.remove('recording');
    document.getElementById('micHint').textContent = '點擊開始說話';
    if (e.error === 'not-allowed') showStatus('請允許麥克風權限', 'err');
    else showStatus('語音錯誤: ' + e.error, 'err');
  };

  recording = true;
  finalText = '';
  document.getElementById('micBtn').classList.add('recording');
  document.getElementById('micHint').textContent = '說話中...點擊停止';
  document.getElementById('transcript').textContent = '';
  document.getElementById('transcript').classList.remove('show');
  recognition.start();
}

// ─── Claude Parse ───
async function parseWithClaude(text) {
  if (!text || !config?.claudeKey) return;
  processing = true;
  document.getElementById('micBtn').classList.add('processing');
  document.getElementById('micHint').textContent = 'AI 解析中...';
  showStatus('AI 解析中...', 'info');

  const today = new Date().toISOString().slice(0, 10);
  const prompt = `你是一個記帳助手。請解析以下語音輸入，提取支出資訊。
回傳嚴格 JSON 格式（不要 markdown），可以是單筆或多筆陣列：
[{"date":"${today}","description":"項目說明","amount":數字,"payment":"信用卡/現金/帳戶/悠遊卡/Line Pay/Apple Pay","currency":"TWD/JPY/USD/EUR","category":"餐飲/交通/購物/娛樂/醫療/日用品/通訊/住宿/教育/其他"}]

規則：
- 沒說日期就用今天 ${today}
- 沒說付款方式就預設「信用卡」
- 沒說幣別就預設 TWD
- 金額要是數字
- category 從上面的選項中選最接近的

語音輸入：「${text}」`;

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await resp.json();
    const content = data.content?.[0]?.text || '';
    const cleaned = content.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(cleaned);
    const items = Array.isArray(parsed) ? parsed : [parsed];

    expenses = [...items, ...expenses];
    saveExpenses();
    render();
    document.getElementById('transcript').classList.remove('show');
    showStatus('已解析 ' + items.length + ' 筆支出', 'ok');
  } catch (err) {
    showStatus('解析失敗: ' + err.message, 'err');
  } finally {
    processing = false;
    document.getElementById('micBtn').classList.remove('processing');
    document.getElementById('micHint').textContent = '點擊開始說話';
  }
}

// ─── Manual Input ───
function manualSubmit() {
  const input = document.getElementById('manualInput');
  const text = input.value.trim();
  if (text && !processing) {
    parseWithClaude(text);
    input.value = '';
  }
}

// ─── Confirm → Google Sheets ───
async function confirmExpense(idx) {
  const item = expenses[idx];
  showStatus('寫入 Google Sheets...', 'info');

  try {
    await fetch(config.sheetUrl, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        token: config.token,
        date: item.date,
        description: item.description,
        amount: item.amount,
        payment: item.payment,
        currency: item.currency,
        category: item.category
      })
    });
    confirmedSet.add(idx);
    saveExpenses();
    render();
    showStatus('✓ 已寫入 Google Sheets', 'ok');
  } catch (err) {
    showStatus('寫入失敗: ' + err.message, 'err');
  }
}

// ─── Delete ───
function deleteExpense(idx) {
  expenses.splice(idx, 1);
  // rebuild confirmed set (indices shifted)
  const newConfirmed = new Set();
  confirmedSet.forEach(i => {
    if (i < idx) newConfirmed.add(i);
    else if (i > idx) newConfirmed.add(i - 1);
  });
  confirmedSet = newConfirmed;
  saveExpenses();
  render();
}

// ─── Edit ───
function openEdit(idx) {
  editIdx = idx;
  const item = expenses[idx];
  document.getElementById('editDate').value = item.date;
  document.getElementById('editDesc').value = item.description;
  document.getElementById('editAmount').value = item.amount;
  document.getElementById('editPayment').value = item.payment;
  document.getElementById('editCurrency').value = item.currency;
  document.getElementById('editModal').classList.add('show');
}

function closeEdit() {
  document.getElementById('editModal').classList.remove('show');
  editIdx = null;
}

function saveEdit() {
  if (editIdx === null) return;
  expenses[editIdx] = {
    ...expenses[editIdx],
    date: document.getElementById('editDate').value,
    description: document.getElementById('editDesc').value,
    amount: document.getElementById('editAmount').value,
    payment: document.getElementById('editPayment').value,
    currency: document.getElementById('editCurrency').value,
  };
  saveExpenses();
  render();
  closeEdit();
}

// ─── Init ───
window.addEventListener('DOMContentLoaded', () => {
  if (!loadConfig()) openSetup();
  loadExpenses();
  render();
});
</script>
</body>
</html>
