<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="記帳">
<link rel="manifest" href="manifest.json">
<title>記帳</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #f5f0eb; --card: #fffdf9; --text: #4a3f35; --text-light: #8c7e72;
    --text-muted: #b5a99a; --border: #e8e0d6; --accent: #c4956a;
    --accent-light: #e8d5c0; --green: #7a9e7e; --red: #c47a7a;
    --shadow: 0 2px 12px rgba(74,63,53,0.06);
  }
  body {
    font-family: 'Zen Maru Gothic','Noto Sans TC',-apple-system,sans-serif;
    background: var(--bg); max-width: 480px; margin: 0 auto;
    min-height: 100vh; min-height: -webkit-fill-available;
    color: var(--text); position: relative; overflow-x: hidden;
  }
  .mascot { position: fixed; pointer-events: none; z-index: 0; font-size: 30px; opacity: 0.3; }
  .mascot-tl { top: 10px; left: 6px; transform: rotate(-10deg); }
  .mascot-tr { top: 55px; right: 6px; transform: rotate(8deg); }
  .mascot-bl { bottom: 78px; left: 8px; transform: rotate(-5deg); }
  .mascot-br { bottom: 82px; right: 10px; transform: rotate(12deg); }
  
  .page { display: none; padding: 16px 16px 100px; position: relative; z-index: 1; }
  .page.active { display: block; }
  
  .nav {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 480px; background: var(--card);
    border-top: 1px solid var(--border); display: flex; z-index: 50;
    padding: 6px 0; padding-bottom: calc(6px + env(safe-area-inset-bottom));
  }
  .nav-item {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px;
    padding: 6px 0; border: none; background: none; color: var(--text-muted);
    font-size: 10px; cursor: pointer; font-family: inherit; transition: color 0.2s;
  }
  .nav-item.active { color: var(--accent); }
  .nav-item .icon { font-size: 22px; }
  
  .card { background: var(--card); border-radius: 14px; padding: 16px; margin-bottom: 12px; box-shadow: var(--shadow); border: 1px solid var(--border); }
  .card-title { font-size: 13px; color: var(--text-light); margin-bottom: 10px; font-weight: 500; }
  
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; padding-top: 4px; }
  .header h1 { font-size: 22px; font-weight: 700; }
  .header .sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  
  .settings-btn { width: 34px; height: 34px; border-radius: 10px; border: 1px solid var(--border); background: var(--card); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  
  .summary-row { display: flex; gap: 10px; margin-bottom: 12px; }
  .summary-item { flex: 1; background: var(--card); border-radius: 12px; padding: 12px; border: 1px solid var(--border); text-align: center; }
  .summary-item .label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
  .summary-item .value { font-size: 20px; font-weight: 700; }
  
  .mic-area { display: flex; flex-direction: column; align-items: center; padding: 16px 0; }
  .mic-btn {
    width: 72px; height: 72px; border-radius: 50%; border: 3px solid var(--accent);
    background: var(--card); color: var(--accent); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; transition: all 0.3s; box-shadow: 0 4px 20px rgba(196,149,106,0.15);
  }
  .mic-btn.recording { background: var(--red); border-color: var(--red); color: #fff; animation: pulse 1.5s infinite; }
  .mic-btn.processing { opacity: 0.5; pointer-events: none; }
  @keyframes pulse { 0%,100%{box-shadow:0 0 0 8px rgba(196,122,122,0.12)} 50%{box-shadow:0 0 0 16px rgba(196,122,122,0.06)} }
  
  .transcript { margin: 12px 0; padding: 10px 14px; border-radius: 10px; background: var(--card); border: 1.5px dashed var(--accent-light); font-size: 14px; display: none; }
  .transcript.show { display: block; }
  
  .manual { display: flex; gap: 8px; margin-bottom: 12px; }
  .manual input { flex: 1; padding: 10px 12px; border-radius: 10px; border: 1.5px solid var(--border); font-size: 14px; outline: none; background: var(--card); }
  .manual button { padding: 10px 16px; border-radius: 10px; border: none; background: var(--accent); color: #fff; font-weight: 600; cursor: pointer; }
  
  .status { padding: 8px 14px; margin-bottom: 12px; border-radius: 8px; font-size: 12px; text-align: center; display: none; }
  .status.show { display: block; }
  .status.ok { background: rgba(122,158,126,0.12); color: var(--green); }
  .status.err { background: rgba(196,122,122,0.12); color: var(--red); }
  .status.info { background: rgba(196,149,106,0.12); color: var(--accent); }
  
  .expense-card { background: var(--card); border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; border-left: 4px solid var(--accent); border-right: 1px solid var(--border); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
  .expense-card.confirmed { opacity: 0.6; }
  .expense-top { display: flex; justify-content: space-between; }
  .expense-actions { display: flex; gap: 6px; margin-top: 8px; justify-content: flex-end; }
  .expense-actions button { padding: 4px 10px; border-radius: 6px; border: 1px solid var(--border); background: #fff; font-size: 12px; cursor: pointer; }
  .btn-confirm { background: var(--green) !important; color: #fff !important; border: none !important; }

  .period-tabs { display: flex; margin-bottom: 12px; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
  .period-tab { flex: 1; padding: 8px; text-align: center; font-size: 13px; background: #fff; color: var(--text-muted); border: none; cursor: pointer; }
  .period-tab.active { background: var(--accent); color: #fff; }

  .pay-stat { display: flex; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .pay-stat .name { width: 80px; font-size: 12px; }
  .pay-stat .bar { flex: 1; height: 6px; background: #eee; border-radius: 3px; margin: 0 10px; position: relative; }
  .pay-stat .bar-fill { height: 100%; border-radius: 3px; background: var(--accent); }
  .pay-stat .amount { width: 70px; text-align: right; font-size: 12px; font-weight: 700; }

  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: none; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(4px); }
  .overlay.show { display: flex; }
  .modal { background: #fff; border-radius: 16px; padding: 20px; width: 90%; max-width: 380px; }
  .modal input, .modal select { width: 100%; padding: 10px; margin: 8px 0; border-radius: 8px; border: 1px solid var(--border); }
</style>
</head>
<body>
<div class="mascot mascot-tl">🐻</div><div class="mascot mascot-tr">🐰</div>

<!-- 設定彈窗 -->
<div class="overlay" id="setupModal"><div class="modal">
  <h2>⚙️ 初始設定</h2>
  <input type="url" id="cfgWorker" placeholder="Cloudflare Worker URL">
  <input type="password" id="cfgKey" placeholder="Claude API Key">
  <input type="url" id="cfgUrl" placeholder="Google Apps Script URL">
  <input type="password" id="cfgToken" placeholder="驗證密碼(Token)">
  <button onclick="saveConfig()" style="width:100%; padding:12px; background:var(--accent); color:#fff; border:none; border-radius:8px; margin-top:10px;">儲存並更新</button>
</div></div>

<!-- 分頁：記帳 -->
<div class="page active" id="page-record">
  <div class="header"><h1>記帳</h1><button class="settings-btn" onclick="openSetup()">⚙️</button></div>
  <div class="mic-area">
    <button class="mic-btn" id="micBtn" onclick="toggleMic()">🎤</button>
    <div id="micHint" style="margin-top:8px; font-size:12px; color:var(--text-muted);">點擊說話</div>
  </div>
  <div class="transcript" id="transcript"></div>
  <div class="manual"><input type="text" id="manualInput" placeholder="早餐 50"><button onclick="manualSubmit()">送出</button></div>
  <div class="status" id="statusBar"></div>
  <div id="expenseList"></div>
</div>

<!-- 分頁：總覽 -->
<div class="page" id="page-overview">
  <div class="header"><h1>總覽</h1><button onclick="loadSheetData()">🔄 更新</button></div>
  <div class="period-tabs">
    <button class="period-tab active" onclick="setPeriod('today',this)">今日</button>
    <button class="period-tab" onclick="setPeriod('week',this)">本週</button>
    <button class="period-tab" onclick="setPeriod('month',this)">本月</button>
  </div>
  <div class="summary-row">
    <div class="summary-item"><div class="label">支出</div><div class="value" id="ovTotal">$0</div></div>
    <div class="summary-item"><div class="label">筆數</div><div class="value" id="ovCount">0</div></div>
  </div>
  <div class="card"><div class="card-title">💳 付款方式統計</div><div id="payStats"></div></div>
</div>

<!-- 分頁：紀錄 -->
<div class="page" id="page-history">
  <div class="header"><h1>紀錄</h1><button onclick="loadSheetData()">🔄 更新</button></div>
  <div id="historyList"></div>
</div>

<!-- 導覽列 -->
<div class="nav">
  <button class="nav-item active" onclick="switchPage('record',this)"><span class="icon">🎤</span>記帳</button>
  <button class="nav-item" onclick="switchPage('overview',this)"><span class="icon">📊</span>總覽</button>
  <button class="nav-item" onclick="switchPage('history',this)"><span class="icon">📋</span>紀錄</button>
</div>

<script>
// --- 核心資料 ---
const PAY_COLORS = {"現金":"#7a9e7e","合庫":"#6b8cae","永豐":"#9b7bb5","匯豐卡(18日結帳8日付款)":"#c47a7a","樂天熊貓卡(5日結帳26日繳款)":"#c4956a","玉山PI錢包(4日結帳11日繳款)":"#6aafb5"};
let config = null, expenses = [], sheetData = [], currentPeriod = 'today';
let recognition = null;

// --- 初始化 ---
function init() {
  const saved = localStorage.getItem('bal-config');
  if (saved) {
    config = JSON.parse(saved);
  } else {
    document.getElementById('setupModal').classList.add('show');
  }
  renderExpenses();
}

// --- 切換頁面 ---
function switchPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  btn.classList.add('active');
  if ((name === 'overview' || name === 'history') && sheetData.length === 0) {
    loadSheetData();
  }
}

// --- 設定管理 ---
function openSetup() { document.getElementById('setupModal').classList.add('show'); }
function saveConfig() {
  config = {
    workerUrl: document.getElementById('cfgWorker').value.trim(),
    claudeKey: document.getElementById('cfgKey').value.trim(),
    sheetUrl: document.getElementById('cfgUrl').value.trim(),
    token: document.getElementById('cfgToken').value.trim()
  };
  localStorage.setItem('bal-config', JSON.stringify(config));
  document.getElementById('setupModal').classList.remove('show');
  loadSheetData();
}

// --- 日期標準化 (關鍵修正) ---
function normalizeDate(d) {
  if (!d) return '';
  const s = String(d).trim();
  const m = s.match(/(\d{4})[\/年-](\d{1,2})[\/月-](\d{1,2})日?/);
  if (m) {
    return `${m[1]}-${m[2].padStart(2, '0')}-${m[3].padStart(2, '0')}`;
  }
  return s;
}

// --- 讀取資料 ---
async function loadSheetData() {
  if (!config || !config.sheetUrl) return;
  showStatus('讀取資料中...', 'info');
  try {
    const res = await fetch(`${config.sheetUrl}?token=${encodeURIComponent(config.token)}`);
    const data = await res.json();
    sheetData = data.map(r => ({
      date: normalizeDate(r['日期'] || r.date),
      description: r['項目'] || r.description,
      amount: parseFloat(String(r['金額'] || r.amount).replace(/,/g, '')),
      payment: r['付款方式'] || r.payment,
      category: r['分類'] || r.category || '其他'
    })).filter(r => !isNaN(r.amount));
    renderOverview();
    renderHistory();
    showStatus('更新成功', 'ok');
  } catch (e) {
    showStatus('讀取失敗: ' + e.message, 'err');
  }
}

// --- 總覽計算 ---
function renderOverview() {
  const now = new Date();
  const today = normalizeDate(now);
  const filtered = sheetData.filter(r => {
    if (currentPeriod === 'today') return r.date === today;
    if (currentPeriod === 'month') return r.date.startsWith(today.slice(0, 7));
    return true; 
  });
  
  const total = filtered.reduce((s, r) => s + r.amount, 0);
  document.getElementById('ovTotal').textContent = '$' + total.toLocaleString();
  document.getElementById('ovCount').textContent = filtered.length;
  
  // 付款統計
  const pays = {};
  filtered.forEach(r => pays[r.payment] = (pays[r.payment] || 0) + r.amount);
  const sorted = Object.entries(pays).sort((a,b) => b[1] - a[1]);
  const max = sorted.length ? sorted[0][1] : 1;
  
  document.getElementById('payStats').innerHTML = sorted.map(([name, val]) => `
    <div class="pay-stat">
      <div class="name">${name.split('(')[0]}</div>
      <div class="bar"><div class="bar-fill" style="width:${(val/max)*100}%; background:${PAY_COLORS[name]||'#c4956a'}"></div></div>
      <div class="amount">$${val.toLocaleString()}</div>
    </div>
  `).join('') || '<div style="text-align:center; padding:20px; color:#ccc;">暫無資料</div>';
}

function setPeriod(p, btn) {
  currentPeriod = p;
  document.querySelectorAll('.period-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderOverview();
}

// --- 歷史紀錄 ---
function renderHistory() {
  const el = document.getElementById('historyList');
  const sorted = [...sheetData].sort((a,b) => b.date.localeCompare(a.date));
  let html = '', lastD = '';
  sorted.forEach(r => {
    if (r.date !== lastD) {
      lastD = r.date;
      html += `<div style="font-size:12px; color:#888; margin:10px 0 5px;">${r.date}</div>`;
    }
    html += `
      <div class="card" style="padding:10px; margin-bottom:5px; display:flex; justify-content:space-between; align-items:center;">
        <div><div style="font-weight:700;">${r.description}</div><div style="font-size:11px; color:#aaa;">${r.payment}</div></div>
        <div style="font-weight:700; color:var(--text);">$${r.amount.toLocaleString()}</div>
      </div>
    `;
  });
  el.innerHTML = html || '<div class="loading">尚無紀錄</div>';
}

// --- 語音/手動輸入 ---
function toggleMic() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return showStatus('瀏覽器不支援語音', 'err');
  if (recognition) { recognition.stop(); recognition = null; return; }
  
  recognition = new SR();
  recognition.lang = 'zh-TW';
  recognition.onstart = () => { document.getElementById('micBtn').classList.add('recording'); };
  recognition.onresult = (e) => {
    const text = e.results[0][0].transcript;
    document.getElementById('transcript').textContent = text;
    document.getElementById('transcript').classList.add('show');
    parseWithClaude(text);
  };
  recognition.onend = () => { document.getElementById('micBtn').classList.remove('recording'); recognition = null; };
  recognition.start();
}

async function parseWithClaude(text) {
  if (!config || !config.claudeKey) return showStatus('請先設定 API Key', 'err');
  showStatus('AI 解析中...', 'info');
  try {
    const res = await fetch(config.workerUrl, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        apiKey: config.claudeKey,
        messages: [{role:'user', content: `解析語音並回傳JSON格式: [{"date":"${new Date().toISOString().slice(0,10)}","description":"項目","amount":數字,"payment":"現金","category":"其他"}]。語音內容: "${text}"`}]
      })
    });
    const data = await res.json();
    const items = JSON.parse(data.content[0].text);
    expenses = [...items, ...expenses];
    renderExpenses();
    showStatus('解析成功', 'ok');
  } catch (e) {
    showStatus('解析失敗', 'err');
  }
}

function manualSubmit() {
  const input = document.getElementById('manualInput');
  if (input.value) { parseWithClaude(input.value); input.value = ''; }
}

function renderExpenses() {
  const list = document.getElementById('expenseList');
  list.innerHTML = expenses.map((item, idx) => `
    <div class="expense-card">
      <div class="expense-top">
        <div><strong>${item.description}</strong><br><small>${item.payment} | ${item.date}</small></div>
        <div style="font-size:18px; font-weight:700;">$${item.amount}</div>
      </div>
      <div class="expense-actions">
        <button onclick="expenses.splice(${idx},1); renderExpenses();">刪除</button>
        <button class="btn-confirm" onclick="confirmEntry(${idx})">✓ 入帳</button>
      </div>
    </div>
  `).join('');
}

async function confirmEntry(idx) {
  const item = expenses[idx];
  showStatus('寫入中...', 'info');
  try {
    await fetch(config.sheetUrl, {
      method: 'POST', mode: 'no-cors',
      body: JSON.stringify({ token: config.token, ...item })
    });
    expenses.splice(idx, 1);
    renderExpenses();
    showStatus('已成功寫入試算表', 'ok');
    loadSheetData();
  } catch (e) {
    showStatus('寫入失敗', 'err');
  }
}

function showStatus(msg, type) {
  const el = document.getElementById('statusBar');
  el.textContent = msg;
  el.className = 'status show ' + type;
  setTimeout(() => el.classList.remove('show'), 3000);
}

// 啟動
window.onload = init;
</script>
</body>
</html>
